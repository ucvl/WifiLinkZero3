name: Maven Package

on:
  release:
    types: [created]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Clean and build with Maven
      run: mvn clean package --file zero/pom.xml

    - name: List target directory
      run: ls -la zero/target

    - name: Upload JAR file
      uses: actions/upload-artifact@v4
      with:
        name: zero-latest
        path: zero/target/*.jar

    - name: Generate download link
      run: echo "Download link: https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/zero-latest.zip"
